<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { margin-top: 0; color: #2c3e50; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #7f8c8d; font-size: 14px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #8e44ad; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #732d91; }
        #mensagem-erro { color: #e74c3c; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🍸 Aurora OS</h2>
        <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 30px;">Acesso Restrito</p>
        
        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••">
        </div>

        <button onclick="fazerLogin()">Entrar</button>
        <div id="mensagem-erro">Usuário ou senha inválidos.</div>
    </div>

    <script>
        // 📍 COLOQUE SUAS CHAVES DO SUPABASE AQUI
        const SUPABASE_URL = 'https://xnvznbmwxvflavmnmxxx.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhudnpuYm13eHZmbGF2bW5teHh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODkxNDMsImV4cCI6MjA4OTg2NTE0M30.EJNiqPeM57QO7b5mwGzem5U9hmftajWBFeeFb7Fxk2g';

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            const erroDiv = document.getElementById('mensagem-erro');
            erroDiv.style.display = 'none';

            try {
                // 1. Gera o Token (Crachá principal)
                const resposta = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
                    body: JSON.stringify({ email, password })
                });
                
                const dados = await resposta.json();
                if (!resposta.ok) throw new Error("Erro no login");

                // 2. 📍 A MÁGICA: Busca a agência a qual este usuário pertence!
                const perfilResposta = await fetch(`${SUPABASE_URL}/rest/v1/user_profiles?select=account_id&user_id=eq.${dados.user.id}`, {
                    method: 'GET',
                    headers: { 
                        'apikey': SUPABASE_ANON_KEY, 
                        'Authorization': `Bearer ${dados.access_token}` 
                    }
                });
                
                const perfilDados = await perfilResposta.json();

                // Se o usuário não tiver uma agência vinculada, bloqueia na porta!
                if (!perfilDados || perfilDados.length === 0) {
                    throw new Error("Perfil ou Agência não encontrados no banco.");
                }

                // 3. Salva TUDO no navegador de forma correta
                localStorage.setItem('aurora_token', dados.access_token);
                localStorage.setItem('aurora_user_id', dados.user.id);
                localStorage.setItem('aurora_user_email', dados.user.email);
                localStorage.setItem('account_id', perfilDados[0].account_id); // Injeta o ID dinâmico

                // 4. Libera a entrada
                window.location.href = 'admin.html';

            } catch (erro) {
                console.error("Falha na autenticação:", erro);
                localStorage.clear(); // Limpa o cache se algo der errado
                erroDiv.innerText = "Credenciais inválidas ou agência não vinculada.";
                erroDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
